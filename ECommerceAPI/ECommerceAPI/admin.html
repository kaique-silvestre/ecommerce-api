<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Loja - Igloo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/shared.css">
    <style>
        /* ===== ADMIN SPECIFIC STYLES ===== */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            align-items: start;
        }

        @media (max-width: 1024px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        .stats-header {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            flex: 1;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-left: 4px solid var(--primary-500);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-full);
            background: var(--primary-50);
            color: var(--primary-600);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        [data-theme="dark"] .stat-icon {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary-400);
        }

        .stat-info h4 {
            color: var(--text-muted);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .stat-info p {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1;
        }

        /* Tabela */
        .table-container {
            overflow-x: auto;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th {
            background: var(--gray-50);
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 2px solid var(--gray-200);
        }

        [data-theme="dark"] .table th {
            background: var(--gray-800);
            border-bottom-color: var(--gray-700);
        }

        .table td {
            padding: 1rem;
            border-bottom: 1px solid var(--gray-100);
            vertical-align: middle;
        }

        [data-theme="dark"] .table td { border-bottom-color: var(--gray-800); }

        .table tr:hover { background: var(--surface-hover); }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-success { background: var(--success-50); color: var(--success-600); }
        .badge-warning { background: var(--warning-50); color: var(--warning-600); }
        .badge-error { background: var(--error-50); color: var(--error-600); }

        [data-theme="dark"] .badge-success { background: rgba(16, 185, 129, 0.1); color: var(--success-500); }
        [data-theme="dark"] .badge-warning { background: rgba(245, 158, 11, 0.1); color: var(--warning-500); }
        [data-theme="dark"] .badge-error { background: rgba(239, 68, 68, 0.1); color: var(--error-500); }
        
        .product-img-mini {
            width: 40px; height: 40px;
            border-radius: var(--radius-md);
            object-fit: cover;
            background: var(--gray-100);
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-content">
            <a href="admin.html" class="brand">
                <i class="fas fa-igloo"></i> Igloo
            </a>
            <nav class="nav">
                <a href="index.html" class="nav-link">Início</a>
                <a href="cadastro.html" class="nav-link">Cadastrar</a>
                <a href="admin.html" class="nav-link active">Painel</a>
                <button class="theme-toggle" aria-label="Alternar Tema">
                    <i class="fas fa-moon"></i>
                </button>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="stats-header">
            <div class="card stat-card">
                <div class="stat-icon"><i class="fas fa-box"></i></div>
                <div class="stat-info">
                    <h4>Total de Produtos</h4>
                    <p id="stat-total-prod">0</p>
                </div>
            </div>
            <div class="card stat-card" style="border-left-color: var(--success-500)">
                <div class="stat-icon" style="color: var(--success-600); background: var(--success-50)"><i class="fas fa-dollar-sign"></i></div>
                <div class="stat-info">
                    <h4>Valor em Estoque</h4>
                    <p id="stat-valor">R$ 0,00</p>
                </div>
            </div>
            <div class="card stat-card" style="border-left-color: var(--warning-500)">
                <div class="stat-icon" style="color: var(--warning-600); background: var(--warning-50)"><i class="fas fa-warehouse"></i></div>
                <div class="stat-info">
                    <h4>Itens Totais (Qtd)</h4>
                    <p id="stat-itens">0</p>
                </div>
            </div>
        </div>

        <div class="dashboard-grid">
            <!-- Tabela Card -->
            <div class="card p-6" style="padding: 1.5rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2 style="font-size: 1.25rem; font-weight: 700; display:flex; gap:0.5rem; align-items:center;">
                        <i class="fas fa-list" style="color:var(--primary-500)"></i> Inventário
                    </h2>
                    <button class="btn btn-primary" style="padding: 0.5rem 1rem;" onclick="carregarDados()">
                        <i class="fas fa-sync-alt"></i> Atualizar
                    </button>
                </div>

                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Produto</th>
                                <th>Preço</th>
                                <th>Estoque</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-produtos">
                            <!-- JS fills this -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Quick Add Card -->
            <div class="card" style="padding: 1.5rem;">
                <h2 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; display:flex; gap:0.5rem; align-items:center;">
                    <i class="fas fa-bolt" style="color:var(--primary-500)"></i> Adição Rápida
                </h2>
                <form id="form-quick" onsubmit="event.preventDefault(); quickAdd();">
                    <div class="form-group">
                        <label class="form-label">Nome</label>
                        <input type="text" id="q-nome" class="form-input" required placeholder="Novo produto...">
                    </div>
                    <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div>
                            <label class="form-label">Preço</label>
                            <input type="number" step="0.01" id="q-preco" class="form-input" required placeholder="0.00">
                        </div>
                        <div>
                            <label class="form-label">Qtd</label>
                            <input type="number" id="q-estoque" class="form-input" required placeholder="0">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                        <i class="fas fa-plus"></i> Salvar Rápido
                    </button>
                    <a href="cadastro.html" class="btn btn-outline" style="width: 100%; margin-top: 0.5rem;">
                        Ir para Cadastro Completo
                    </a>
                </form>
            </div>
        </div>
    </main>

    <!-- Utils and Logic -->
    <script src="assets/js/utils.js"></script>
    <script>
        const tbody = document.getElementById('tabela-produtos');

        function getStatusBadge(stock) {
            if (stock === 0) return '<span class="badge badge-error">Esgotado</span>';
            if (stock < 10) return '<span class="badge badge-warning">Baixo</span>';
            return '<span class="badge badge-success">OK</span>';
        }

        async function carregarDados() {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 2rem;"><div class="skeleton" style="height:20px; width:100%"></div></td></tr>';
            try {
                const produtos = await ProductService.getAll();
                
                // Atualizar Stats
                document.getElementById('stat-total-prod').innerText = produtos.length;
                document.getElementById('stat-valor').innerText = FormatUtils.currency(
                    produtos.reduce((acc, p) => acc + (p.price * p.stock), 0)
                );
                document.getElementById('stat-itens').innerText = produtos.reduce((acc, p) => acc + p.stock, 0);

                // Preencher Tabela
                if(produtos.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:2rem; color:var(--text-muted);">Nenhum produto cadastrado.</td></tr>';
                    return;
                }

                tbody.innerHTML = produtos.map(p => `
                    <tr>
                        <td style="display:flex; align-items:center; gap:1rem;">
                            <img src="${p.imageUrl || 'https://via.placeholder.com/40'}" class="product-img-mini" alt="">
                            <div>
                                <div style="font-weight:600; color:var(--text-main);">${p.name}</div>
                                <div style="font-size:0.75rem; color:var(--text-muted);">ID: ${p.productId}</div>
                            </div>
                        </td>
                        <td style="font-weight:600">${FormatUtils.currency(p.price)}</td>
                        <td>${p.stock} unid.</td>
                        <td>${getStatusBadge(p.stock)}</td>
                        <td>
                            <button class="btn btn-outline btn-icon" title="Ação temporária"><i class="fas fa-ellipsis-v"></i></button>
                        </td>
                    </tr>
                `).join('');
                
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:2rem; color:var(--error-500);">Erro ao carregar dados. API desligada?</td></tr>';
            }
        }

        async function quickAdd() {
            const btn = document.querySelector('#form-quick button[type="submit"]');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';
            btn.disabled = true;

            const produtoFast = {
                name: document.getElementById('q-nome').value,
                price: parseFloat(document.getElementById('q-preco').value),
                stock: parseInt(document.getElementById('q-estoque').value),
                description: 'Adicionado via Quick Add',
                imageUrl: ''
            };

            try {
                await ProductService.create(produtoFast);
                Toast.show('Produto adicionado rápido!');
                document.getElementById('form-quick').reset();
                carregarDados();
            } catch (err) {
                Toast.show('Erro ao salvar', 'error');
            } finally {
                btn.innerHTML = '<i class="fas fa-plus"></i> Salvar Rápido';
                btn.disabled = false;
            }
        }

        // Run on load
        document.addEventListener('DOMContentLoaded', carregarDados);
    </script>
</body>
</html>
