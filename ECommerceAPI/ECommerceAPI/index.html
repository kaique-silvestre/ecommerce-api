<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igloo - Sua Loja Premium</title>
    <!-- FontAwesome Core -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Design System (Shared) -->
    <link rel="stylesheet" href="assets/css/shared.css">
    
    <style>
        /* ===== INDEX SPECIFIC STYLES - OPTIMIZED ===== */
        
        /* Product Grid - Simplified */
        .section-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-align: center;
            background: var(--gradient-primary);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            padding-bottom: 2rem;
        }

        /* Product Card - Simplified */
        .product-card {
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: transform 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-8px);
        }

        .product-image-container {
            position: relative;
            padding-top: 100%;
            overflow: hidden;
            background: var(--gray-100);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }

        [data-theme="dark"] .product-image-container {
            background: var(--gray-800);
        }

        .product-image {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .product-badge {
            position: absolute;
            top: 1rem; right: 1rem;
            background: rgba(255, 255, 255, 0.95);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 700;
            box-shadow: var(--shadow-md);
            z-index: 2;
        }

        .product-content {
            padding: 0.75rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border-radius: 0 0 var(--radius-lg) var(--radius-lg);
        }

        .product-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            gap: 1rem;
        }

        .product-price {
            font-size: 1.1rem;
            font-weight: 700;
            background: var(--gradient-primary);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .product-footer .btn-primary {
            flex-shrink: 0;
            padding: 0.5rem 0.75rem;
            font-size: 0.75rem;
        }

        /* Empty State - Simplified */
        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 2px dashed var(--gray-300);
            grid-column: 1 / -1;
        }

        [data-theme="dark"] .empty-state {
            border-color: var(--gray-700);
            background: var(--surface);
        }
        
        .empty-state i {
            font-size: 3rem;
            color: var(--primary-500);
            margin-bottom: 1.5rem;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-main);
        }

        .empty-state p {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Responsive - Simplified */
        @media (max-width: 768px) {
            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 0.75rem;
            }
            
            .section-title {
                font-size: 1.75rem;
            }
        }

        @media (max-width: 480px) {
            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 0.75rem;
            }
        }

    </style>
</head>
<body>

    <!-- Header Glassmorphism -->
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="brand">
                <i class="fas fa-igloo"></i> Igloo
            </a>
            
            <nav class="nav">
                <a href="index.html" class="nav-link active">Início</a>
                <a href="cadastro.html" class="nav-link">Cadastrar</a>
                <a href="admin.html" class="nav-link">Painel</a>
                <button class="theme-toggle" aria-label="Alternar Tema">
                    <i class="fas fa-moon"></i>
                </button>
            </nav>
        </div>
    </header>

    <main>
        <!-- Product View Area -->
        <section id="catalogo" class="container">
            <h2 class="section-title">
                <i class="fas fa-fire"></i> Destaques
            </h2>
            
            <div id="product-grid" class="product-grid">
                <!-- Skeletons (Loading State) -->
                <div class="card product-card skeleton" style="height: 400px; border:none; box-shadow:none;"></div>
                <div class="card product-card skeleton" style="height: 400px; border:none; box-shadow:none;"></div>
                <div class="card product-card skeleton" style="height: 400px; border:none; box-shadow:none;"></div>
                <div class="card product-card skeleton" style="height: 400px; border:none; box-shadow:none;"></div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer-global">
        <p>&copy; 2026 Igloo.</p>
    </footer>

    <!-- Utils and Logic -->
    <script src="assets/js/utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const grid = document.getElementById('product-grid');
            
            // Renderiza um produto (Card HTML)
            const renderProductCard = (produto) => {
                const imagemFallback = 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500&q=80';
                const imagem = produto.imageUrl && produto.imageUrl.startsWith('http') ? produto.imageUrl : imagemFallback;
                
                // Emblema visual de estoque
                let badgeHTML = '';
                if (produto.stock === 0) {
                    badgeHTML = '<div class="product-badge" style="color:var(--error-600)">Esgotado</div>';
                } else if(produto.stock < 5) {
                    badgeHTML = '<div class="product-badge" style="color:var(--warning-600)">Últimas!</div>';
                }

                return `
                    <article class="card product-card">
                        <div class="product-image-container">
                            ${badgeHTML}
                            <img src="${imagem}" alt="${produto.name}" class="product-image" loading="lazy">
                        </div>
                        <div class="product-content">
                            <h3 class="product-title">${produto.name}</h3>
                            <p class="product-desc">${produto.description || 'Sem descrição fornecida.'}</p>
                            <div class="product-footer">
                                <span class="product-price">${FormatUtils.currency(produto.price)}</span>
                                <button class="btn btn-primary" style="padding: 0.5rem 1rem;" 
                                        onclick="Toast.show('Adicionado ao carrinho com sucesso!')"
                                        ${produto.stock === 0 ? 'disabled' : ''}>
                                    <i class="fas fa-cart-plus"></i>
                                </button>
                            </div>
                        </div>
                    </article>
                `;
            };

            // Busca na API
            try {
                const produtos = await ProductService.getAll();
                grid.innerHTML = ''; // Remove skeletons
                
                if (produtos.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-box-open"></i>
                            <h3>A loja está vazia</h3>
                            <p class="text-muted">Ainda não há produtos cadastrados. Vá até o painel administrativo para adicionar itens.</p>
                            <a href="cadastro.html" class="btn btn-primary" style="margin-top: 1rem;">
                                Cadastrar Produto
                            </a>
                        </div>
                    `;
                } else {
                    grid.innerHTML = produtos.map(renderProductCard).join('');
                }
            } catch (err) {
                // Skeletons permanecem, mas se for falha total:
                grid.innerHTML = `
                    <div class="empty-state" style="border-color: var(--error-500)">
                        <i class="fas fa-plug" style="color: var(--error-500)"></i>
                        <h3 style="color: var(--error-500)">Falha de Conexão</h3>
                        <p>Não foi possível conectar a API (Backend). Certifique-se de que o servidor C# ASP.NET Core está rodando.</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
